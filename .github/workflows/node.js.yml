name: Electron Build

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            node: 22.x
            build_target: win
          - os: ubuntu-latest
            node: 22.x
            build_target: linux
          - os: macos-latest
            node: 22.x
            build_target: mac-arm64
          - os: macos-15-intel
            node: 22.x
            build_target: mac-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build renderer
        run: npm run build --if-present

      - name: Debug mac runner / ffmpeg
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          echo "Runner OS: $RUNNER_OS"
          uname -a
          arch
          node -p "process.platform + ' ' + process.arch"
          node -p "require('ffmpeg-static')"
          file "$(node -p "require('ffmpeg-static')")"

      - name: Build on Windows
        if: matrix.build_target == 'win'
        run: npx electron-builder --win

      - name: Build on Linux
        if: matrix.build_target == 'linux'
        run: npx electron-builder --linux

      - name: Build on macOS x64
        if: matrix.build_target == 'mac-x64'
        run: npx electron-builder --mac --x64

      - name: Build on macOS arm64
        if: matrix.build_target == 'mac-arm64'
        run: npx electron-builder --mac --arm64

      # - name: Upload artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: dist-${{ matrix.build_target }}
      #     path: dist/**
      #     if-no-files-found: error
      #     retention-days: 1

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/**/*.zip
            dist/**/*.pkg
            dist/**/*Setup*.exe
            dist/**/*.msi
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
          draft: false
          prerelease: false