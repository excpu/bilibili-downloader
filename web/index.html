<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <script src="./lib/qrcode.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bilibili视频下载器</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="model.css">
    <link rel="stylesheet" href="setting.css">
</head>

<body>
    <div class="topbar">
        <div class="brand">
            <div class="brand-badge">BD</div>
        </div>
        <div class="status">
            <span class="pill"><span id="taskCount">0</span>个任务</span>
            <span class="pill clickable" onclick="openPlayer()">播放器</span>
            <span class="pill clickable" onclick="openMergeTool()">合并工具</span>
            <span class="pill clickable" onclick="settingWeb.openSetting()">设置</span>
        </div>
        <div class="avatar" id="avatar">登录</div>
    </div>
    </div>

    <main class="container">
        <!-- 链接输入 -->
        <section class="card">
            <h2 class="card-title">输入视频链接或BV号</h2>
            <div class="input-row">
                <div class="field"><input id="urlInput" type="url" placeholder="输入视频链接..." />
                    <span class="suffix" id="suffix">URL</span>
                </div>
                <button class="btn brand" id="confirmBtn">确认</button>
            </div>
            <!-- <div class="actions"><span class="hint">点击确认后选择清晰度开始下载（演示）。</span></div> -->
        </section>
        <!-- 扫码登录 -->
        <section class="card m-card hidden" id="loginSection">
            <h2 class="card-title">登录</h2>
            <div class="loginQr" id="loginQr">
                <img id="loginQrS" src="./assets/compressed-loading-placeholder.jpg" /><br />
            </div>
            <div class="loginBtn">
                <button class="btn brand" id="refreshLoginQr">刷新二维码</button>
                <button class="btn" id="cancelLogin">取消登录</button>
            </div>
        </section>
        <!-- 视频详情展示与分辨率选择 -->
        <section class="card m-card hidden" id="videoInfoSection">
            <h2 class="card-title">视频信息</h2>
            <div class="video-info" id="videoInfo">
                <div class="thumbnail">
                    <img id="videoThumbnail" src="./assets/compressed-loading-placeholder.jpg" />
                </div>
                <div class="details">
                    <div class="title" id="videoTitle">视频标题</div>
                    <div class="meta" id="videoMeta">UP主 · 播放量 · 弹幕数 · 发布时间</div>
                    <div class="quality-selection">
                        <label for="qualitySelect">首选清晰度：</label>
                        <select id="qualitySelect"></select>
                    </div>
                    <div class="quality-selection">
                        <label for="qualitySelectAudio">首选音频质量：</label>
                        <select id="qualitySelectAudio"></select>
                    </div>
                    <div class="quality-selection">
                        <input type="checkbox" id="downloadDanmuCheckbox">
                        <label class="clickable" onclick="independentDownload.downloadDanmu()">下载弹幕</label>
                        <input type="checkbox" id="downloadCoverCheckbox">
                        <label class="clickable" onclick="independentDownload.downloadCover()">下载封面</label>
                    </div>
                    <!-- 分P视频选择框 -->
                    <div class="multi-part-selector hidden" id="multiPartSelector">
                        <div class="quick-slector">
                            <button class="btn small" onclick="infoSection.selectAllPart()">全选</button>
                            <button class="btn small" onclick="infoSection.ignoreAllPart()">全不选</button>
                        </div>
                        <div class="single-selector" id="multiPartSelectorInner">
                            <!-- <label><input class="p-item" type="checkbox" name="part[]" value="1">P1 - 示例分P选择</label> -->
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn brand" id="downloadBtn">确认下载</button>
                        <button class="btn" id="cancelVideoInfo">取消</button>
                    </div>
                </div>
            </div>
        </section>
        <!-- 下载任务展示 -->
        <section class="card m-card">
            <h2 class="card-title">下载任务</h2>
            <div id="tasksContainer" aria-live="polite">
                <!-- <div class="task">
                    <div>
                        <div class="title title-vc p-10 pl-0">
                            <span>清朝老片</span>
                            <span class="pill ft-small" style="margin-left:4px">8K 超高清</span>
                        </div>
                        <div class="progress">
                            <i style="width:72%"></i>
                        </div>
                        <div class="meta mt-5">速度：3.20 MB/s</div>
                    </div>
                    <div style="display:grid; gap:8px; align-content:center">
                        <button class="btn" data-action="remove" data-id="demo1">取消</button>
                    </div>
                </div> -->
            </div>
        </section>

        <!-- 弹出框容器 -->
        <!-- 工具弹出框 -->
        <div class="model hidden" id="model">
            <div class="model-content">
                <div class="model-header">
                    <span id="modelTitle">标题</span>
                    <button class="btn small" id="modelCloseBtn">关闭</button>
                </div>
                <div class="model-body" id="modelBody">
                    <!-- 模态框内容 -->
                    <!-- 播放器 -->
                    <!-- 缓存合并工具 -->
                </div>
            </div>
        </div>
        <!-- 设置弹出框 -->
        <div class="model hidden" id="settingModel">
            <div class="model-content">
                <div class="model-header">
                    <span id="settingModelTitle">设置</span>
                    <button class="btn small" id="settingModelCloseBtn">关闭</button>
                </div>
                <div class="model-body" id="settingModelBody">
                    <!-- 用户信息部分 -->
                    <div class="setting-section">
                        <h3 class="setting-section-title">用户信息</h3>
                        <div class="user-info">
                            <img id="settingUserAvatar" class="user-avatar" src="./assets/compressed-loading-placeholder.jpg" alt="用户头像" />
                            <div class="user-details">
                                <div class="user-name" id="settingUserName">未登录</div>
                                <button class="btn small" id="logoutBtn">退出登录</button>
                            </div>
                        </div>
                    </div>

                    <!-- 下载目录部分 -->
                    <div class="setting-section">
                        <h3 class="setting-section-title">下载设置</h3>
                        <div class="setting-item">
                            <label for="downloadPathInput">下载目录：</label>
                            <div class="path-input-group">
                                <input type="text" id="downloadPathInput" class="path-input" placeholder="选择下载目录..." readonly />
                                <button class="btn small" id="selectDownloadPathBtn">浏览</button>
                            </div>
                        </div>
                    </div>

                    <!-- 下载引擎部分 -->
                    <div class="setting-section">
                        <h3 class="setting-section-title">下载引擎</h3>
                        <div class="setting-item">
                            <label for="downloadEngineSelect">选择下载引擎：</label>
                            <select id="downloadEngineSelect" class="setting-select">
                                <option value="node">Node.js 引擎</option>
                                <option value="aria2">Aria2 引擎</option>
                            </select>
                        </div>
                    </div>

                    <!-- 保存按钮 -->
                    <div class="setting-actions">
                        <button class="btn brand" id="saveSettingBtn">保存并退出</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="hidden">
    </main>
    <div class="spacer"></div>
    <script src="bv_enc.js"></script>
    <script src="independent_download.js"></script>
    <script src="select_card.js"></script>
    <script src="model.js"></script>
    <script src="index.js"></script>
    <script src="download_task.js"></script>
    <script src="ui_detail.js"></script>
    <script src="./script/setting_web.js"></script>
    <!-- 开发专用 -->
    <script src="dev.js"></script>
</body>

</html>
